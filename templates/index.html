<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4">House Price Prediction</h2>
                    
                    <form action="{{ url_for('predict_datapoint')}}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Total Area (sq ft)</label>
                                <input class="form-control" type="number" name="area" placeholder="e.g. 5000" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bedrooms</label>
                                <input class="form-control" type="number" name="bedrooms" placeholder="e.g. 3" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Bathrooms</label>
                                <input class="form-control" type="number" name="bathrooms" placeholder="e.g. 2" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stories</label>
                                <input class="form-control" type="number" name="stories" placeholder="e.g. 2" required />
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Main Road Access</label>
                                <select class="form-select" name="mainroad">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Furnishing Status</label>
                                <select class="form-select" name="furnishingstatus">
                                    <option value="furnished">Furnished</option>
                                    <option value="semi-furnished">Semi-Furnished</option>
                                    <option value="unfurnished">Unfurnished</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Guestroom</label>
                                <select class="form-select" name="guestroom">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Basement</label>
                                <select class="form-select" name="basement">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hot Water Heating</label>
                                <select class="form-select" name="hotwaterheating">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Air Conditioning</label>
                                <select class="form-select" name="airconditioning">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Parking Spaces</label>
                                <input class="form-control" type="number" name="parking" placeholder="e.g. 1" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Preferred Area</label>
                                <select class="form-select" name="prefarea">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg w-100">Predict Price</button>
                        </div>
                    </form>

                    {% if results %}
                    <div class="alert alert-success mt-4 text-center">
                        <h4>Predicted House Price: ${{ results|round(2) }}</h4>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>

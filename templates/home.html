<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI House Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .btn-predict { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; font-weight: bold; }
        .result-box { background-color: #e9ecef; border-radius: 10px; padding: 20px; border-left: 5px solid #764ba2; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card main-card p-4 p-md-5">
                    <div class="text-center mb-5">
                        <h1 class="display-5 fw-bold text-dark">House Price Prediction</h1>
                        <p class="text-muted">Enter property details to get an instant AI-powered valuation.</p>
                    </div>

                    <form action="{{ url_for('predict_datapoint')}}" method="POST">
                        <div class="row g-4">
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Area (sq ft)</label>
                                <input type="number" name="area" class="form-control" placeholder="5000" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Bedrooms</label>
                                <input type="number" name="bedrooms" class="form-control" placeholder="3" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Bathrooms</label>
                                <input type="number" name="bathrooms" class="form-control" placeholder="2" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Stories</label>
                                <input type="number" name="stories" class="form-control" placeholder="2" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Main Road Access</label>
                                <select class="form-select" name="mainroad">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Guestroom</label>
                                <select class="form-select" name="guestroom">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Basement</label>
                                <select class="form-select" name="basement">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Hot Water Heating</label>
                                <select class="form-select" name="hotwaterheating">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Air Conditioning</label>
                                <select class="form-select" name="airconditioning">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Parking Spaces</label>
                                <input type="number" name="parking" class="form-control" placeholder="2" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Preferred Area</label>
                                <select class="form-select" name="prefarea">
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Furnishing Status</label>
                                <select class="form-select" name="furnishingstatus">
                                    <option value="furnished">Furnished</option>
                                    <option value="semi-furnished">Semi-Furnished</option>
                                    <option value="unfurnished">Unfurnished</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-5">
                            <button type="submit" class="btn btn-predict btn-lg w-100 py-3 shadow">Get Predicted Price</button>
                        </div>
                    </form>

                    {% if results %}
                    <div class="result-box mt-5 text-center">
                        <h3 class="text-muted mb-1">Estimated Market Value</h3>
                        <h2 class="display-6 fw-bold text-primary">${{ "{:,.2f}".format(results) }}</h2>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
